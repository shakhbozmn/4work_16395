[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --cov=. --cov-report=html --cov-report=term
testpaths = accounts marketplace

[coverage:run]
branch = True
source = accounts marketplace
omit =
    */migrations/*
    */tests/*
    */venv/*
    */__pycache__/*
    .dockerignore
    .git/
    .github/
