upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name fourwork.polandcentral.cloudapp.azure.com 20.215.96.174;

    # Required for Let's Encrypt SSL certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Docker health check endpoint
    location /health/ {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    location / {
        # Redirect to HTTPS only for domain name (SSL certificate is for domain only)
        if ($host = "fourwork.polandcentral.cloudapp.azure.com") {
            return 301 https://$host$request_uri;
        }
        # For IP access, serve HTTP (no SSL certificate available for IP)
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}

server {
    listen 443 ssl http2;
    server_name fourwork.polandcentral.cloudapp.azure.com;

    ssl_certificate     /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    client_max_body_size 10m;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }
}
