events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    upstream web {
        server web:8000;
    }

    # Map to determine the correct forwarded protocol
    # If Azure LB sends X-Forwarded-Proto, use it; otherwise default to https for production
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ''      https;  # Default to https if not set (production behind Azure LB)
    }

    # Single server block for all traffic
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Health check endpoint - treat as plain HTTP (no protocol forwarding)
        # This is internal Docker communication, not from Azure LB
        location /health/ {
            access_log off;
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            # Don't set X-Forwarded-Proto for health checks - keep it as plain HTTP
            # This prevents Django from thinking it's HTTPS and causing redirects
        }

        # Static files
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            alias /app/media/;
            expires 30d;
            add_header Cache-Control "public";
        }

        # Main application
        location / {
            proxy_pass http://web;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # CRITICAL: Use the mapped forwarded protocol
            # Preserves Azure LB's X-Forwarded-Proto header, defaults to https if not present
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            
            proxy_redirect off;
            proxy_buffering off;
        }

        # Security: deny hidden files
        location ~ /\. {
            deny all;
        }
    }
}
