upstream django {
    server web:8000;
}

# Catch-all: silently drop requests with unknown Host headers (port scanners, bots, direct-IP probing on port 80 that don't match the blocks below).
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Http — redirect all traffic to HTTPS on the canonical domain.
server {
    listen 80;
    server_name fourwork.polandcentral.cloudapp.azure.com 20.215.96.174;

    # Required for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Internal Docker health check (used by nginx healthcheck; never exposed to users)
    location /health/ {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Everything else — redirect unconditionally to HTTPS on the canonical domain.
    location / {
        return 301 https://fourwork.polandcentral.cloudapp.azure.com$request_uri;
    }
}

# HTTPS — canonical production server
server {
    listen 443 ssl;
    http2  on;                          # nginx ≥ 1.25.1 syntax (no deprecation warning)
    server_name fourwork.polandcentral.cloudapp.azure.com;

    # --- TLS certificates (Let's Encrypt) --------------------------------
    ssl_certificate     /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/privkey.pem;

    # --- TLS hardening ----------------------------------------------------
    ssl_protocols             TLSv1.2 TLSv1.3;
    # Mozilla Intermediate cipher list — removes weak/legacy ciphers while
    # retaining compatibility with clients that don't support TLS 1.3.
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # Session resumption — reduces repeated full handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;            # Disable session tickets to preserve forward secrecy

    # OCSP stapling — server proves cert validity without client having to
    # contact the CA, cutting latency and hiding client IP from CA.
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/chain.pem;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # HSTS: 2-year max-age required for HSTS preload list submission.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-XSS-Protection          "0"       always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    client_max_body_size 10m;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml
                      application/rss+xml image/svg+xml;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location / {
        proxy_pass         http://django;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      8 8k;
    }
}
