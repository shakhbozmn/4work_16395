upstream django {
    server web:8000;
    keepalive 32;
}

log_format upstream_timing '$remote_addr - $remote_user [$time_local] '
                           '"$request" $status $body_bytes_sent '
                           '"$http_referer" "$http_user_agent" '
                           'rt=$request_time urt=$upstream_response_time '
                           'uip=$upstream_addr req_id=$http_x_request_id';

limit_req_status 429;
limit_req_zone $binary_remote_addr zone=general_rps:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_rpm:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

# Catch-all: silently drop requests with unknown Host headers (port scanners, bots, direct-IP probing on port 80 that don't match the blocks below).
server {
    listen 80 default_server;
    server_name _;
    return 444;
}

# Http — redirect all traffic to HTTPS on the canonical domain.
server {
    listen 80;
    server_name fourwork.polandcentral.cloudapp.azure.com 20.215.96.174;

    # Required for Let's Encrypt certificate renewal
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Internal Docker health check (used by nginx healthcheck; never exposed to users)
    location /health/ {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Everything else — redirect unconditionally to HTTPS on the canonical domain.
    location / {
        return 301 https://fourwork.polandcentral.cloudapp.azure.com$request_uri;
    }
}

# HTTPS — canonical production server
server {
    listen 443 ssl;
    http2  on;                          # nginx ≥ 1.25.1 syntax (no deprecation warning)
    server_name fourwork.polandcentral.cloudapp.azure.com;
    server_tokens off;

    access_log /var/log/nginx/access.log upstream_timing;

    limit_conn per_ip 50;

    ssl_certificate     /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/privkey.pem;
    ssl_dhparam         /etc/nginx/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Session resumption — reduces repeated full handshake overhead
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;            
    ssl_stapling        on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/fourwork.polandcentral.cloudapp.azure.com/chain.pem;
    resolver            127.0.0.11 8.8.8.8 valid=300s ipv6=off;
    resolver_timeout    5s;

    # HSTS: 2-year max-age required for HSTS preload list submission.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"    always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; connect-src 'self';" always;

    client_max_body_size 10m;

    proxy_http_version 1.1;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_redirect     off;
    proxy_connect_timeout 30s;
    proxy_read_timeout    60s;
    proxy_send_timeout    60s;
    proxy_buffering    on;
    proxy_buffer_size  8k;
    proxy_buffers      8 8k;

    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1024;
    gzip_types        text/plain text/css text/xml text/javascript
                      application/json application/javascript application/xml
                      application/rss+xml image/svg+xml application/wasm
                      font/woff font/woff2;

    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /app/media/;
        expires 7d;
        access_log off;
    }

    location = /accounts/login/ {
        limit_req zone=login_rpm burst=5 nodelay;
        proxy_pass http://django;
    }

    location / {
        limit_req zone=general_rps burst=20 nodelay;
        proxy_pass http://django;
    }
}

# HTTPS catch-all — reject unknown hosts to avoid certificate leakage on 443
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;
}
