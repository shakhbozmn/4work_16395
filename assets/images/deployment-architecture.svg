<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" width="680" height="580" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#161b27;stop-opacity:1"/>
    </linearGradient>

    <!-- Card gradients -->
    <linearGradient id="internetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f2040;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d2018;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="djangoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1a1030;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1a30;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="redisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a1a1a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#221010;stop-opacity:1"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow marker -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="580" rx="16" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="58" x2="680" y2="58"/>
    <line x1="0" y1="116" x2="680" y2="116"/>
    <line x1="0" y1="174" x2="680" y2="174"/>
    <line x1="0" y1="232" x2="680" y2="232"/>
    <line x1="0" y1="290" x2="680" y2="290"/>
    <line x1="0" y1="348" x2="680" y2="348"/>
    <line x1="0" y1="406" x2="680" y2="406"/>
    <line x1="0" y1="464" x2="680" y2="464"/>
    <line x1="0" y1="522" x2="680" y2="522"/>
    <line x1="68" y1="0" x2="68" y2="580"/>
    <line x1="136" y1="0" x2="136" y2="580"/>
    <line x1="204" y1="0" x2="204" y2="580"/>
    <line x1="272" y1="0" x2="272" y2="580"/>
    <line x1="340" y1="0" x2="340" y2="580"/>
    <line x1="408" y1="0" x2="408" y2="580"/>
    <line x1="476" y1="0" x2="476" y2="580"/>
    <line x1="544" y1="0" x2="544" y2="580"/>
    <line x1="612" y1="0" x2="612" y2="580"/>
  </g>

  <!-- Title -->
  <text x="340" y="36" text-anchor="middle" fill="#94a3b8" font-size="11" font-weight="500" letter-spacing="3" opacity="0.9">PRODUCTION DEPLOYMENT ARCHITECTURE</text>

  <!-- ═══════════════════ INTERNET ═══════════════════ -->
  <rect x="60" y="60" width="560" height="80" rx="10" fill="url(#internetGrad)" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
  <!-- Top accent bar -->
  <rect x="60" y="60" width="560" height="3" rx="2" fill="#3b82f6" opacity="0.8"/>

  <!-- Internet icon (globe-ish) -->
  <circle cx="108" cy="100" r="20" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="108" cy="100" rx="10" ry="20" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="88" y1="100" x2="128" y2="100" stroke="#3b82f6" stroke-width="1" opacity="0.5"/>
  <line x1="91" y1="88" x2="125" y2="88" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>
  <line x1="91" y1="112" x2="125" y2="112" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <text x="144" y="95" fill="#93c5fd" font-size="15" font-weight="700">Internet</text>
  <text x="144" y="114" fill="#64748b" font-size="11">Public traffic entry point</text>

  <!-- Port badge -->
  <rect x="552" y="84" width="56" height="22" rx="11" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="580" y="99" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">HTTPS</text>

  <!-- ═══════════════════ ARROW 1 ═══════════════════ -->
  <line x1="340" y1="142" x2="340" y2="172" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" opacity="0.7"/>

  <!-- ═══════════════════ NGINX ═══════════════════ -->
  <rect x="60" y="175" width="560" height="90" rx="10" fill="url(#nginxGrad)" stroke="#22c55e" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="175" width="560" height="3" rx="2" fill="#22c55e" opacity="0.8"/>

  <!-- Nginx icon (shield-like) -->
  <path d="M108 192 L126 199 L126 213 Q126 222 108 228 Q90 222 90 213 L90 199 Z" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.7"/>
  <text x="108" y="215" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="700" opacity="0.8">N</text>

  <text x="144" y="200" fill="#86efac" font-size="15" font-weight="700">Nginx Reverse Proxy</text>
  <text x="144" y="219" fill="#64748b" font-size="11">SSL/TLS Termination</text>

  <!-- Port badges -->
  <rect x="440" y="189" width="60" height="20" rx="10" fill="#0d2018" stroke="#22c55e" stroke-width="1"/>
  <text x="470" y="203" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600">:443 SSL</text>
  <rect x="508" y="189" width="50" height="20" rx="10" fill="#0d2018" stroke="#22c55e" stroke-width="1" opacity="0.6"/>
  <text x="533" y="203" text-anchor="middle" fill="#86efac" font-size="10" font-weight="600" opacity="0.7">:80 →</text>

  <!-- Docker badge -->
  <rect x="440" y="215" width="118" height="20" rx="4" fill="rgba(34,197,94,0.08)" stroke="rgba(34,197,94,0.2)" stroke-width="1"/>
  <text x="499" y="229" text-anchor="middle" fill="#4ade80" font-size="9" opacity="0.7">🐳 Docker Container</text>

  <!-- ═══════════════════ ARROW 2 ═══════════════════ -->
  <line x1="340" y1="267" x2="340" y2="297" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowBlue)" opacity="0.7"/>

  <!-- ═══════════════════ DJANGO ═══════════════════ -->
  <rect x="60" y="300" width="560" height="90" rx="10" fill="url(#djangoGrad)" stroke="#a78bfa" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="300" width="560" height="3" rx="2" fill="#a78bfa" opacity="0.8"/>

  <!-- Django icon (D letter styled) -->
  <rect x="90" y="315" width="6" height="30" rx="3" fill="#a78bfa" opacity="0.8"/>
  <path d="M96 315 Q120 315 120 330 Q120 345 96 345" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.8"/>

  <text x="144" y="325" fill="#c4b5fd" font-size="15" font-weight="700">Django Application</text>
  <text x="144" y="344" fill="#64748b" font-size="11">Gunicorn WSGI Server</text>

  <!-- Port badges -->
  <rect x="490" y="314" width="68" height="20" rx="10" fill="#1a1030" stroke="#a78bfa" stroke-width="1"/>
  <text x="524" y="328" text-anchor="middle" fill="#c4b5fd" font-size="10" font-weight="600">:8000</text>

  <!-- Docker badge -->
  <rect x="440" y="340" width="118" height="20" rx="4" fill="rgba(167,139,250,0.08)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
  <text x="499" y="354" text-anchor="middle" fill="#a78bfa" font-size="9" opacity="0.7">🐳 Docker Container</text>

  <!-- ═══════════════════ SPLIT ARROWS ═══════════════════ -->
  <!-- Vertical stem -->
  <line x1="340" y1="392" x2="340" y2="420" stroke="#4a5568" stroke-width="1.5" opacity="0.8"/>
  <!-- Horizontal bar -->
  <line x1="200" y1="420" x2="480" y2="420" stroke="#4a5568" stroke-width="1.5" opacity="0.8"/>
  <!-- Left arrow -->
  <line x1="200" y1="420" x2="200" y2="450" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>
  <!-- Right arrow -->
  <line x1="480" y1="420" x2="480" y2="450" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.8"/>

  <!-- ═══════════════════ POSTGRESQL ═══════════════════ -->
  <rect x="60" y="453" width="260" height="100" rx="10" fill="url(#pgGrad)" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <rect x="60" y="453" width="260" height="3" rx="2" fill="#60a5fa" opacity="0.8"/>

  <!-- PG icon (elephant silhouette simplified) -->
  <ellipse cx="98" cy="490" rx="14" ry="12" fill="none" stroke="#60a5fa" stroke-width="1.5" opacity="0.7"/>
  <ellipse cx="104" cy="478" rx="6" ry="8" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.5"/>
  <line x1="95" y1="502" x2="92" y2="515" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>
  <line x1="101" y1="502" x2="100" y2="515" stroke="#60a5fa" stroke-width="1.5" opacity="0.6"/>

  <text x="126" y="483" fill="#93c5fd" font-size="14" font-weight="700">PostgreSQL</text>
  <text x="126" y="500" fill="#64748b" font-size="11">Primary Database</text>

  <!-- Port badge -->
  <rect x="126" y="510" width="50" height="20" rx="10" fill="#0f1a30" stroke="#60a5fa" stroke-width="1"/>
  <text x="151" y="524" text-anchor="middle" fill="#93c5fd" font-size="10" font-weight="600">:5432</text>

  <!-- Docker badge -->
  <rect x="182" y="510" width="118" height="20" rx="4" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
  <text x="241" y="524" text-anchor="middle" fill="#60a5fa" font-size="9" opacity="0.7">🐳 Docker Container</text>

  <!-- ═══════════════════ REDIS ═══════════════════ -->
  <rect x="360" y="453" width="260" height="100" rx="10" fill="url(#redisGrad)" stroke="#f87171" stroke-width="1.5" opacity="0.95"/>
  <rect x="360" y="453" width="260" height="3" rx="2" fill="#f87171" opacity="0.8"/>

  <!-- Redis icon (stylized cube/diamond) -->
  <polygon points="398,472 412,480 398,488 384,480" fill="none" stroke="#f87171" stroke-width="1.5" opacity="0.7"/>
  <polygon points="398,480 412,488 412,480" fill="none" stroke="#f87171" stroke-width="1" opacity="0.5"/>
  <line x1="398" y1="488" x2="398" y2="500" stroke="#f87171" stroke-width="1" opacity="0.4"/>

  <text x="424" y="483" fill="#fca5a5" font-size="14" font-weight="700">Redis Cache</text>
  <text x="424" y="500" fill="#64748b" font-size="11">In-Memory Cache</text>

  <!-- Port badge -->
  <rect x="424" y="510" width="50" height="20" rx="10" fill="#221010" stroke="#f87171" stroke-width="1"/>
  <text x="449" y="524" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="600">:6379</text>

  <!-- Docker badge -->
  <rect x="480" y="510" width="118" height="20" rx="4" fill="rgba(248,113,113,0.08)" stroke="rgba(248,113,113,0.2)" stroke-width="1"/>
  <text x="539" y="524" text-anchor="middle" fill="#f87171" font-size="9" opacity="0.7">🐳 Docker Container</text>

  <!-- Corner decoration dots -->
  <circle cx="24" cy="24" r="3" fill="#1e2530"/>
  <circle cx="36" cy="24" r="3" fill="#1e2530"/>
  <circle cx="48" cy="24" r="3" fill="#1e2530"/>
  <circle cx="656" cy="24" r="3" fill="#1e2530"/>
  <circle cx="644" cy="24" r="3" fill="#1e2530"/>
  <circle cx="632" cy="24" r="3" fill="#1e2530"/>
</svg>
