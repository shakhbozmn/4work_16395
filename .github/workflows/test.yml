name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.3.0 flake8==7.0.0 isort==5.13.2

      - name: Check code formatting with Black
        run: black --check accounts marketplace config

      - name: Check import sorting with isort
        run: isort --check-only accounts marketplace config

      - name: Lint with flake8
        run: flake8 accounts marketplace config --max-line-length=88 --extend-ignore=E203,W503,E501

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fourwork_test_db
          POSTGRES_USER: fourwork_test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.1.1 pytest-django==4.8.0 pytest-cov==4.1.0 factory-boy==3.3.0

      - name: Create environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=fourwork_test_db
          DB_USER=fourwork_test_user
          DB_PASSWORD=test_password
          DB_HOST=localhost
          DB_PORT=5432
          DJANGO_ENVIRONMENT=development
          EOF

      - name: Run migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=50
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30
