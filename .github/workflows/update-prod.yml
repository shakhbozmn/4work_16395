name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black==24.3.0 flake8==7.0.0 isort==5.13.2

      - name: Check code formatting with Black
        run: black --check accounts marketplace config

      - name: Check import sorting with isort
        run: isort --check-only accounts marketplace config

      - name: Lint with flake8
        run: flake8 accounts marketplace config --max-line-length=88 --extend-ignore=E203,W503,E501

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fourwork_test_db
          POSTGRES_USER: fourwork_test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci-only
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=fourwork_test_db
          DB_USER=fourwork_test_user
          DB_PASSWORD=test_password
          DB_HOST=localhost
          DB_PORT=5432
          DJANGO_ENVIRONMENT=development
          EOF

      - name: Run migrations
        run: python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Run tests with coverage
        run: pytest --cov=. --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=80
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  build:
    name: Build and Push to Docker Hub
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/4work
          tags: |
            type=raw,value=latest
            type=sha,prefix=main-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/4work:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/4work:buildcache,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            cd /opt/4work || exit 1

            # Verify .env.production exists before proceeding
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production not found. Create it on the server before deploying."
              exit 1
            fi

            # Create timestamped backup
            BACKUP_DIR="./backups/4work_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            cp .env.production docker-compose.yml "$BACKUP_DIR/" 2>/dev/null || true
            echo "Backup created at $BACKUP_DIR"

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main

            # Pull pre-built image from Docker Hub
            echo "Pulling Docker image..."
            docker compose -f docker-compose.yml --env-file .env.production pull web

            # Zero-downtime: bring up new containers then remove old ones
            echo "Starting new containers..."
            docker compose -f docker-compose.yml --env-file .env.production up -d --remove-orphans

            # Clean up dangling images
            docker image prune -f --filter "dangling=true"

            echo "Deployment complete!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Waiting for application to become healthy..."
            for i in $(seq 1 30); do
              if curl -f -s -m 5 "http://localhost/health/" > /dev/null 2>&1; then
                echo "Health check passed (attempt $i)"
                exit 0
              fi
              echo "Attempt $i/30 - not ready yet, retrying in 10s..."
              sleep 10
            done
            echo "Health check failed after 30 attempts"
            exit 1

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deployment failed, initiating rollback..."
            cd /opt/4work

            LATEST_BACKUP=$(ls -td ./backups/4work_* 2>/dev/null | head -1)

            if [ -n "$LATEST_BACKUP" ]; then
              echo "Rolling back using $LATEST_BACKUP"
              cp "$LATEST_BACKUP/.env.production" .env.production
              cp "$LATEST_BACKUP/docker-compose.yml" docker-compose.yml
              docker compose -f docker-compose.yml --env-file .env.production down
              docker compose -f docker-compose.yml --env-file .env.production up -d
              echo "Rollback completed"
            else
              echo "No backup found, cannot rollback automatically"
              exit 1
            fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Print deployment result
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "Deployment to production succeeded."
          else
            echo "Deployment to production failed."
          fi
