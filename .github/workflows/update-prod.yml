name: Update Production, CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

jobs:
  lint:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black==24.3.0 flake8==7.0.0 isort==5.13.2

      - name: Check code formatting with Black
        run: black --check accounts marketplace config

      - name: Check import sorting with isort
        run: isort --check-only accounts marketplace config

      - name: Lint with flake8
        run: flake8 accounts marketplace config --max-line-length=88 --extend-ignore=E203,W503,E501

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: fourwork_test_db
          POSTGRES_USER: fourwork_test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest==8.1.1 pytest-django==4.8.0 pytest-cov==4.1.0 factory-boy==3.3.0

      - name: Create environment file
        run: |
          cat > .env << EOF
          SECRET_KEY=test-secret-key-for-ci
          DEBUG=True
          ALLOWED_HOSTS=localhost,127.0.0.1
          DB_NAME=fourwork_test_db
          DB_USER=fourwork_test_user
          DB_PASSWORD=test_password
          DB_HOST=localhost
          DB_PORT=5432
          DJANGO_ENVIRONMENT=development
          EOF

      - name: Run migrations
        run: |
          python manage.py makemigrations
          python manage.py migrate
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=xml --cov-report=term --cov-report=html --cov-fail-under=50
        env:
          DJANGO_SETTINGS_MODULE: config.settings

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            
            # Create backup before deployment
            cd /opt/4work || exit 1
            BACKUP_DIR="./backups/4work_$(date +%Y%m%d_%H%M%S)"
            mkdir -p "$BACKUP_DIR"
            
            echo "Creating backup..."
            cp -r .env.production docker-compose.yml "$BACKUP_DIR"/ 2>/dev/null || true
            
            # Verify .env.production exists
            if [ ! -f .env.production ]; then
              echo "ERROR: .env.production file not found. Please create it on the server before deploying."
              exit 1
            fi
            
            # Pull latest changes
            echo "Pulling latest code..."
            git fetch origin
            git reset --hard origin/main
            
            # Deploy with new containers
            echo "Deploying application..."
            docker compose -f docker-compose.yml --env-file .env.production down || true
            docker compose -f docker-compose.yml --env-file .env.production pull --quiet
            docker compose -f docker-compose.yml --env-file .env.production up -d --build
            
            # Wait for database to be ready
            echo "Waiting for database to be ready..."
            sleep 5
            
            # Run migrations
            echo "Running migrations..."
            docker compose -f docker-compose.yml --env-file .env.production exec -T web python manage.py migrate --noinput || {
              echo "ERROR: Migrations failed!"
              exit 1
            }
            
            # Collect static files
            echo "Collecting static files..."
            docker compose -f docker-compose.yml --env-file .env.production exec -T web python manage.py collectstatic --noinput --clear || true
            
            # Clean up old images
            echo "Cleaning up old Docker images..."
            docker image prune -f --filter "dangling=true"
            
            echo "✓ Deployment completed!"

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Wait for application to be ready
            echo "Waiting for application to be ready..."
            
            # Get the app URL from environment or use localhost for testing
            APP_URL="${APP_URL:-http://localhost:8000}"
            
            for i in {1..30}; do
              if curl -f -s -m 5 "$APP_URL/health/" > /dev/null 2>&1; then
                echo "✓ Health check passed at $APP_URL/health/"
                exit 0
              fi
              echo "Attempt $i/30 failed, retrying in 10 seconds..."
              sleep 10
            done
            echo "✗ Health check failed after 30 attempts"
            # Continue with warning instead of hard failure
            echo "⚠ Proceeding with caution - health check may need manual verification"
            exit 0

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deployment failed, initiating rollback..."
            cd /opt/4work
            
            # Find most recent backup
            LATEST_BACKUP=$(ls -td ./backups/4work_* 2>/dev/null | head -1)
            
            if [ -n "$LATEST_BACKUP" ]; then
              echo "Rolling back to $LATEST_BACKUP"
              cp $LATEST_BACKUP/.env.production .env.production
              cp $LATEST_BACKUP/docker-compose.yml docker-compose.yml
              
              docker compose -f docker-compose.yml --env-file .env.production down
              docker compose -f docker-compose.yml --env-file .env.production up -d
              
              echo "Rollback completed"
            else
              echo "No backup found, cannot rollback"
            fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "Deployment to production successful!"
          else
            echo "Deployment to production failed!"
          fi
