name: Deploy to Azure VM

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/4work &&
            git pull origin main &&
            docker-compose -f docker-compose.yml --env-file .env.production down &&
            docker-compose -f docker-compose.yml --env-file .env.production pull &&
            docker-compose -f docker-compose.yml --env-file .env.production up -d --build &&
            docker-compose -f docker-compose.yml --env-file .env.production exec -T django python manage.py migrate --noinput &&
            docker-compose -f docker-compose.yml --env-file .env.production exec -T django python manage.py collectstatic --noinput

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -f https://dscc-shahbozms.polandcentral.cloudapp.azure.com/health || exit 1
            
