name: Deploy to Eskiz Server

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
  SSH_HOST: ${{ secrets.SSH_HOST }}
  SSH_USERNAME: ${{ secrets.SSH_USERNAME }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install flake8 black pytest pytest-django pytest-cov

      - name: Run flake8 linting
        run: |
          flake8 config/ accounts marketplace

      - name: Run black formatting check
        run: |
          black --check config/ accounts marketplace

      - name: Run isort import check
        run: |
          isort --check-only config/ accounts marketplace

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: config.settings.production
        run: |
          pytest --cov=. --cov-report=html --cov-report=term

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Build Docker image
        run: |
          echo ${{ github.sha }} > VERSION.txt
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/4work:$VERSION .

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/4work:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/4work:latest

      - name: Deploy to Eskiz server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/4work &&
            docker-compose pull &&
            docker-compose down &&
            docker-compose up -d &&
            docker-compose exec -T django python manage.py migrate --noinput &&
            docker-compose exec -T django python manage.py collectstatic --noinput

      - name: Health check
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            curl -f http://localhost/health || exit 1

      - name: Cleanup old Docker images
        if: always()
        uses: actions/delete-package@v4
        with:
          names: |
            ${{ secrets.DOCKERHUB_USERNAME }}/4work:latest
          keep-latest: true
          token: ${{ secrets.GITHUB_TOKEN }}
