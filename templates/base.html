<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}4work - Freelance Marketplace{% endblock %}</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        fadeSlideIn: {
                            '0%':   { opacity: '0', transform: 'translateY(12px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        fadeSlideDown: {
                            '0%':   { opacity: '0', transform: 'translateY(-8px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        toastIn: {
                            '0%':   { opacity: '0', transform: 'translateX(24px)' },
                            '100%': { opacity: '1', transform: 'translateX(0)' },
                        },
                        toastOut: {
                            '0%':   { opacity: '1', transform: 'translateX(0)' },
                            '100%': { opacity: '0', transform: 'translateX(24px)' },
                        },
                    },
                    animation: {
                        'fade-in':   'fadeSlideIn 0.35s ease both',
                        'fade-in-1': 'fadeSlideIn 0.35s 0.05s ease both',
                        'fade-in-2': 'fadeSlideIn 0.35s 0.10s ease both',
                        'fade-in-3': 'fadeSlideIn 0.35s 0.15s ease both',
                        'fade-in-4': 'fadeSlideIn 0.35s 0.20s ease both',
                        'fade-in-5': 'fadeSlideIn 0.35s 0.25s ease both',
                        'fade-down': 'fadeSlideDown 0.3s ease both',
                        'toast-in':  'toastIn 0.3s ease both',
                        'toast-out': 'toastOut 0.3s ease both',
                    },
                }
            }
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <style>
        body { font-family: 'DM Sans', sans-serif; }
        h1, h2, h3, .font-display { font-family: 'Bricolage Grotesque', sans-serif; }
        .input-base {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.375rem;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .input-base:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        .btn-primary {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.5rem 1rem;
            background: #4f46e5; color: white;
            border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-primary:hover { background: #4338ca; }
        .btn-ghost {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 0.5rem 1rem;
            color: #374151; border: 1px solid #e5e7eb;
            border-radius: 0.375rem; font-size: 0.875rem; font-weight: 500;
            transition: background 0.15s;
            text-decoration: none;
        }
        .btn-ghost:hover { background: #f9fafb; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 0.5rem; }
        .status-open    { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; }
        .status-reviewing { color: #d97706; background: #fffbeb; border: 1px solid #fde68a; }
        .status-assigned { color: #2563eb; background: #eff6ff; border: 1px solid #bfdbfe; }
        .status-completed { color: #6b7280; background: #f9fafb; border: 1px solid #e5e7eb; }
        .status-pending  { color: #d97706; background: #fffbeb; border: 1px solid #fde68a; }
        .status-accepted { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; }
        .status-rejected { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; }
        /* Flatpickr overrides */
        .flatpickr-day.selected,
        .flatpickr-day.selected:hover { background: #4f46e5; border-color: #4f46e5; }
        .flatpickr-day:hover { background: #eef2ff; }
        .flatpickr-months .flatpickr-month,
        .flatpickr-weekdays,
        span.flatpickr-weekday { background: #4f46e5; color: white; }
        .flatpickr-current-month .flatpickr-monthDropdown-months { background: #4f46e5; }
        @keyframes toastIn  { from { opacity:0; transform:translateX(24px); } to { opacity:1; transform:translateX(0); } }
        @keyframes toastOut { from { opacity:1; transform:translateX(0); } to { opacity:0; transform:translateX(24px); } }
        .toast-item { animation: toastIn 0.3s ease both; }
        .toast-item.dismissing { animation: toastOut 0.3s ease both; }
    </style>
</head>
<body class="bg-white min-h-screen flex flex-col text-gray-900">
    {% include 'components/navbar.html' %}

    {% if messages %}
        <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2" style="min-width:280px;max-width:360px">
            {% for message in messages %}
                <div class="toast-item flex items-start justify-between gap-3 px-4 py-3 rounded-md text-sm border shadow-sm
                    {% if 'error' in message.tags %}bg-red-50 text-red-700 border-red-200
                    {% elif 'success' in message.tags %}bg-green-50 text-green-700 border-green-200
                    {% elif 'warning' in message.tags %}bg-yellow-50 text-yellow-700 border-yellow-200
                    {% else %}bg-gray-50 text-gray-700 border-gray-200{% endif %}">
                    <span>{{ message }}</span>
                    <button onclick="dismissToast(this.parentElement)" class="shrink-0 opacity-50 hover:opacity-100 transition-opacity leading-none text-base">&times;</button>
                </div>
            {% endfor %}
        </div>
    {% endif %}

    <main class="{% block main_class %}flex-1 max-w-5xl w-full mx-auto px-4 sm:px-6 py-10{% endblock %}">
        {% block content %}{% endblock %}
    </main>

    {% include 'components/footer.html' %}

    <script>
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if (menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
        }

        function dismissToast(el) {
            if (el._dismissing) return;
            el._dismissing = true;
            el.classList.add('dismissing');
            setTimeout(() => el.remove(), 320);
        }

        document.querySelectorAll('.toast-item').forEach((toast, i) => {
            setTimeout(() => dismissToast(toast), 2000 + i * 300);
        });

    {% block extra_js %}{% endblock %}
</body>
