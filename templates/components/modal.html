<div id="{{ id }}" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
  <!-- Background backdrop -->
  <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeModal('{{ id }}')"></div>

  <div class="fixed inset-0 z-10 overflow-y-auto">
    <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
      <!-- Modal panel -->
      <div class="relative transform overflow-hidden rounded-lg bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg">
        {% if title %}
          <div class="bg-white px-4 pb-4 pt-5 sm:p-6 sm:pb-4">
            <div class="sm:flex sm:items-start">
              {% if icon %}
                <div class="mx-auto flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full
                  {% if icon_type == 'success' %} bg-green-100
                  {% elif icon_type == 'warning' %} bg-yellow-100
                  {% elif icon_type == 'danger' %} bg-red-100
                  {% else %} bg-blue-100 {% endif %} sm:mx-0 sm:h-10 sm:w-10">
                  <svg class="h-6 w-6
                    {% if icon_type == 'success' %} text-green-600
                    {% elif icon_type == 'warning' %} text-yellow-600
                    {% elif icon_type == 'danger' %} text-red-600
                    {% else %} text-blue-600 {% endif %}" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="{{ icon }}" />
                  </svg>
                </div>
              {% endif %}
              <div class="mt-3 text-center sm:ml-4 sm:mt-0 sm:text-left {% if icon %} sm:w-10/12 {% endif %}">
                <h3 class="text-base font-semibold leading-6 text-gray-900" id="modal-title">{{ title }}</h3>
                <div class="mt-2">
                  <p class="text-sm text-gray-500">{{ message }}</p>
                </div>
              </div>
            </div>
          </div>
        {% endif %}

        {% block content %}{% endblock %}

        <div class="bg-gray-50 px-4 py-3 sm:flex sm:flex-row-reverse sm:px-6">
          {% if confirm_text %}
            <button type="button" onclick="{{ confirm_action }}"
              class="inline-flex w-full justify-center rounded-md 
              {% if confirm_type == 'danger' %} bg-red-600 text-white hover:bg-red-700 focus:ring-red-500
              {% else %} bg-indigo-600 text-white hover:bg-indigo-700 focus:ring-indigo-500 {% endif %}
              px-3 py-2 text-sm font-semibold shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 sm:ml-3 sm:w-auto">
              {{ confirm_text }}
            </button>
          {% endif %}
          <button type="button" onclick="closeModal('{{ id }}')"
            class="mt-3 inline-flex w-full justify-center rounded-md bg-white px-3 py-2 text-sm font-semibold text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 hover:bg-gray-50 sm:mt-0 sm:w-auto">
            {{ cancel_text|default:"Cancel" }}
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
function openModal(id) {
  document.getElementById(id).classList.remove('hidden');
  document.body.style.overflow = 'hidden';
}

function closeModal(id) {
  document.getElementById(id).classList.add('hidden');
  document.body.style.overflow = 'auto';
}
</script>
