<footer class="bg-gray-800 text-white mt-12">
    <div class="container mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div>
                <h3 class="text-xl font-bold mb-4">4work</h3>
                <p class="text-gray-400">Connect with talented freelancers and find your next project.</p>
            </div>
            <div>
                <h3 class="text-xl font-bold mb-4">Quick Links</h3>
                <ul class="space-y-2">
                    <li><a href="{% url 'marketplace:project_list' %}" class="text-gray-400 hover:text-white transition">Projects</a></li>
                    <li><a href="{% url 'marketplace:category_list' %}" class="text-gray-400 hover:text-white transition">Categories</a></li>
                </ul>
            </div>
            <div>
                <h3 class="text-xl font-bold mb-4">Account</h3>
                <ul class="space-y-2">
                    {% if user.is_authenticated %}
                        <li><a href="{% url 'accounts:profile_detail' user.username %}" class="text-gray-400 hover:text-white transition">Profile</a></li>
                        <li><a href="{% url 'accounts:logout' %}" class="text-gray-400 hover:text-white transition">Logout</a></li>
                    {% else %}
                        <li><a href="{% url 'accounts:login' %}" class="text-gray-400 hover:text-white transition">Login</a></li>
                        <li><a href="{% url 'accounts:register' %}" class="text-gray-400 hover:text-white transition">Register</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
        <div class="border-t border-gray-700 mt-8 pt-8 text-center text-gray-400">
            <p>&copy; 2025 4work. All rights reserved.</p>
        </div>
    </div>
</footer>
