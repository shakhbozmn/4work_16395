<nav class="bg-white shadow-md">
    <div class="container mx-auto px-4">
        <div class="flex justify-between items-center h-16">
            <a href="{% url 'home' %}" class="text-2xl font-bold text-indigo-600">4work</a>
            
            <div class="hidden md:flex space-x-8">
                <a href="{% url 'marketplace:project_list' %}" class="text-gray-700 hover:text-indigo-600 transition">Projects</a>
                <a href="{% url 'marketplace:category_list' %}" class="text-gray-700 hover:text-indigo-600 transition">Categories</a>
                <a href="{% url 'marketplace:skill_list' %}" class="text-gray-700 hover:text-indigo-600 transition">Skills</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'accounts:dashboard' %}" class="text-gray-700 hover:text-indigo-600 transition">Dashboard</a>
                    <a href="{% url 'marketplace:application_list' %}" class="text-gray-700 hover:text-indigo-600 transition">Applications</a>
                    <a href="{% url 'accounts:profile_detail' user.username %}" class="text-gray-700 hover:text-indigo-600 transition">Profile</a>
                {% endif %}
            </div>
            
            <div class="flex items-center space-x-4">
                {% if user.is_authenticated %}
                    <span class="hidden md:block text-gray-600">Welcome, {{ user.username }}</span>
                    <form method="post" action="{% url 'accounts:logout' %}" class="inline">
                        {% csrf_token %}
                        <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition cursor-pointer">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'accounts:login' %}" class="text-gray-700 hover:text-indigo-600 transition">Login</a>
                    <a href="{% url 'accounts:register' %}" class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700 transition">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
